<!DOCTYPE html>
<html>
<head>
    <title>Meezan | AI Engineer</title>

    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: monospace;
            margin: 0;
            padding: 0;
        }

        .container {
            padding: 40px;
        }

        h1 {
            color: #00ff9f;
        }

        .box {
            border: 1px solid #00ff9f;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        a {
            color: #00ff9f;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>> whoami</h1>
<p id="typing"></p>

<script>
    let text = "Meezan - AI/ML Engineer & Full Stack Developer";
    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 50);
        }
    }

    typeEffect();
</script>

    <h1>> skills</h1>
    <p>Python | Machine Learning | React | NLP | SQL</p>

    <div class="box">
        <h2>Smart Yoga AI</h2>
        <p>95% accurate pose detection using Computer Vision</p>
    </div>

    <div class="box">
        <h2>Fake News Detection</h2>
        <p>93% accurate NLP classifier</p>
    </div>

</div>

</body>
</html>
